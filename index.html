<!doctype html>
<html>
<head>
    <title>Examination Session</title>
    <script>
        WS_URL = "https://examsock.onrender.com/ws"; // !! Change Me !!
        ws = new WebSocket(WS_URL)        
        // 3. Update UI when connection is established
        ws.onopen = (event) => {
            document.getElementById("loadingws").style.display = "none";
            document.getElementById("header").style.display = "inline";
        };

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                lock()
            }
        })
        window.addEventListener("blur", () => {
            lock()
        })
        document.addEventListener("fullscreenchange", () => {
            if (!document.fullscreenElement) {
                lock()
            }
        })
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("start").addEventListener("click", start)

            document.getElementById("unlockform").addEventListener("submit", (e) => {
                e.preventDefault()
                if (document.getElementById("lockreason").value.length < 3) {
                    alert("Reason is not long enough.")
                } else {
                    unlock()
                }
            })
        })

        function start() {
            document.getElementById("header").style.display = "none"
            document.getElementById("exam").style.display = "block"
            document.getElementById("exam").requestFullscreen().catch(err => {
                console.log("Error attempting to enable full-screen mode")
            })
    
        }

        function end() {
            document.getElementById("header").style.display = "block"
            document.getElementById("exam").style.display = "none"
            document.exitFullscreen().then(() => {console.log("Exited fs")}).catch((err) => {})
            ws.send("exited")
        }
        function submit() {
            
        }
        function lock() {
            end()
            document.getElementById('lock').style.display = 'inline'
            document.getElementById('exam').style.display = "none"
            document.getElementById('header').style.display = 'none'
        }

        function unlock() {
            start()
        }
    </script>
</head>
<body>
    <div id="header" style="display: none;">
        <h1>Welcome to Examination</h1>
        <button id="start">Start your exam</button>
    </div>

    <div id="exam" style="display:none;">
        <textarea style="width: 100%; height: 100%;"></textarea>
        <br>
        <button onclick="end()">Finish Exam</button>
    </div>
    <div id="loadingws">
        <h1>Connecting...</h1>
    </div>
    <div id="lock" style="display: none;">
        <h1>Exam has been locked</h1>
        <form id="unlockform">
            <input id="lockreason" placeholder="Enter a reason to unlock.">
            <input type="submit" value="Unlock">
        </form>
    </div>
</body>
</html>
